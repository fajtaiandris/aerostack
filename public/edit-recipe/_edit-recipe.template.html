<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="view-transition" content="same-origin" />
    <title>Edit Recipe • AeroStack</title>
    <link rel="icon" href="/favicon.ico" />
    <meta property="og:image" content="/og.png" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/editor.css" />
    <script>
      const isMenu = () => !!document.querySelector(".menu-overlay");
      window.addEventListener("pageswap", (e) => {
        if (e.viewTransition)
          e.viewTransition.types.add(isMenu() ? "from-menu" : "to-menu");
      });
      window.addEventListener("pagereveal", (e) => {
        if (e.viewTransition)
          e.viewTransition.types.add(isMenu() ? "to-menu" : "from-menu");
      });
    </script>
  </head>
  <body>
    <header>
      <div class="header-spacer"></div>
      <a href="/" class="logo-wordmark-link" aria-label="AeroStack home">
        <h1 class="logo-wordmark">AeroStack</h1>
      </a>
      <a href="/menu.html" class="menu-btn" aria-label="Open menu">☰</a>
    </header>
    <main class="editor-page">
      <div class="editor-container">
        <div class="editor-card">
          <input
            type="text"
            id="recipe-title"
            class="editor-title"
            placeholder="Recipe title"
            autocomplete="off"
          />
          <input
            type="text"
            id="recipe-author"
            class="editor-author"
            placeholder="Author"
            autocomplete="off"
          />
          <div id="editorjs"></div>
        </div>

        <div class="tag-picker">
          <div class="tag-picker-group">
            <span class="tag-picker-label">Level</span>
            <div class="tag-picker-chips">
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Beginner"
                /><span>Beginner</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Intermediate"
                /><span>Intermediate</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Advanced"
                /><span>Advanced</span></label
              >
            </div>
          </div>
          <div class="tag-picker-group">
            <span class="tag-picker-label">Roast</span>
            <div class="tag-picker-chips">
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Dark roast"
                /><span>Dark roast</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Medium roast"
                /><span>Medium roast</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Light roast"
                /><span>Light roast</span></label
              >
            </div>
          </div>
          <div class="tag-picker-group">
            <span class="tag-picker-label">Grind</span>
            <div class="tag-picker-chips">
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Coarse grind"
                /><span>Coarse grind</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Medium grind"
                /><span>Medium grind</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Medium-fine grind"
                /><span>Medium-fine grind</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Fine grind"
                /><span>Fine grind</span></label
              >
            </div>
          </div>
          <div class="tag-picker-group">
            <span class="tag-picker-label">Brew method</span>
            <div class="tag-picker-chips">
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Inverted"
                /><span>Inverted</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Experimental"
                /><span>Experimental</span></label
              >
            </div>
          </div>
          <div class="tag-picker-group">
            <span class="tag-picker-label">Drink style</span>
            <div class="tag-picker-chips">
              <label class="tag-chip"
                ><input type="checkbox" name="recipe-tag" value="Cold" /><span
                  >Cold</span
                ></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Espresso style"
                /><span>Espresso style</span></label
              >
              <label class="tag-chip"
                ><input type="checkbox" name="recipe-tag" value="Milk" /><span
                  >Milk</span
                ></label
              >
            </div>
          </div>
          <div class="tag-picker-group">
            <span class="tag-picker-label">Serving</span>
            <div class="tag-picker-chips">
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="2 servings"
                /><span>2 servings</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Large serving"
                /><span>Large serving</span></label
              >
            </div>
          </div>
          <div class="tag-picker-group">
            <span class="tag-picker-label">Equipment</span>
            <div class="tag-picker-chips">
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="AeroPress Go"
                /><span>AeroPress Go</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="AeroPress XL"
                /><span>AeroPress XL</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="PuckPuck"
                /><span>PuckPuck</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Metal filter"
                /><span>Metal filter</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Paper filter"
                /><span>Paper filter</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Fellow Prismo"
                /><span>Fellow Prismo</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="Flow control cap"
                /><span>Flow control cap</span></label
              >
            </div>
          </div>
        </div>

        <button type="button" class="editor-submit" id="submit-recipe">
          Save
        </button>
      </div>
    </main>
    <footer>
      made with ⛾ by <a href="https://github.com/fajtaiandris">fajtaiandris</a>
    </footer>
    <script id="edit-recipe-data" type="application/json">
      {{preloadedData}}
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@2/dist/editorjs.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@2/dist/header.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@2/dist/editorjs-list.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@1/dist/delimiter.umd.js"></script>
    <script src="/edit-recipe/main.js"></script>
    <script src="/menu.js"></script>
  </body>
</html>
