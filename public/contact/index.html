<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="view-transition" content="same-origin" />
    <title>Contact • AeroStack</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script>
      const isMenu = () => !!document.querySelector(".menu-overlay");
      window.addEventListener("pageswap", (e) => {
        if (e.viewTransition)
          e.viewTransition.types.add(isMenu() ? "from-menu" : "to-menu");
      });
      window.addEventListener("pagereveal", (e) => {
        if (e.viewTransition)
          e.viewTransition.types.add(isMenu() ? "to-menu" : "from-menu");
      });
    </script>
  </head>
  <body>
    <header>
      <div class="header-spacer"></div>
      <a href="/"
        ><img src="/aerostack.webp" alt="AeroStack logo" class="logo"
      /></a>
      <a href="/menu.html" class="menu-btn" aria-label="Open menu">☰</a>
    </header>

    <main class="editor-page">
      <div class="editor-container" id="container">
        <h1>You can tell me</h1>

        <form class="editor-card contact-form" method="POST" id="form">
          <input
            type="hidden"
            name="access_key"
            value="b636b305-07e1-4e10-9173-9903948ca54b"
          />

          <div class="contact-field">
            <label for="name">Name</label>
            <input
              id="name"
              type="text"
              name="name"
              placeholder="Your name"
              required
            />
          </div>

          <div class="contact-field">
            <label for="email">Email</label>
            <input
              id="email"
              type="email"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="contact-field">
            <label for="message">Message</label>
            <textarea
              id="message"
              name="message"
              placeholder="Whatever it is, let me know"
              rows="6"
              required
            ></textarea>
          </div>

          <button type="submit" class="editor-submit">Send</button>
        </form>
      </div>
    </main>

    <script src="/contact/sendEmail.js"></script>
    <script src="/menu.js"></script>
  </body>
</html>
