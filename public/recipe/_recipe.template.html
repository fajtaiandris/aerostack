<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="view-transition" content="same-origin" />
    <title>{{title}} by {{author}} • AeroStack</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script>
      const isMenu = () => !!document.querySelector(".menu-overlay");
      window.addEventListener("pageswap", (e) => {
        if (e.viewTransition)
          e.viewTransition.types.add(isMenu() ? "from-menu" : "to-menu");
      });
      window.addEventListener("pagereveal", (e) => {
        if (e.viewTransition)
          e.viewTransition.types.add(isMenu() ? "to-menu" : "from-menu");
      });
    </script>
  </head>
  <body>
    <header>
      <div class="header-spacer"></div>
      <a href="/"
        ><img src="/aerostack.webp" alt="AeroStack logo" class="logo"
      /></a>
      <a href="/menu.html" class="menu-btn" aria-label="Open menu">☰</a>
    </header>
    <main class="recipe-page">
      <div class="recipe-view-container" id="recipe-view">
        <article class="recipe-view">
          <div class="rv-header">
            <div class="rv-header-body">
              <h1 class="rv-title">{{title}}</h1>
              <div class="rv-meta">
                <span>by <strong>{{author}}</strong></span>
                <span>{{timeAgo}}</span>
              </div>
            </div>
          </div>
          <div class="rv-tags">{{tags}}</div>
          <div class="rv-body">
            <recipe-content content="{{content}}"></recipe-content>
          </div>
        </article>
        <section class="rv-comments" aria-label="Comments">
          <script
            src="https://giscus.app/client.js"
            data-repo="fajtaiandris/giscuss-test"
            data-repo-id="R_kgDORSm3ZA"
            data-category="General"
            data-category-id="DIC_kwDORSm3ZM4C2p4T"
            data-mapping="pathname"
            data-strict="0"
            data-reactions-enabled="0"
            data-emit-metadata="0"
            data-input-position="top"
            data-theme="noborder_dark"
            data-lang="en"
            crossorigin="anonymous"
            async
          ></script>
        </section>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@2/dist/editorjs.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@2/dist/header.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@2/dist/editorjs-list.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@1/dist/delimiter.umd.js"></script>
    <script src="/recipe/recipe-content.js"></script>
    <script src="/recipe/main.js"></script>
    <script src="/menu.js"></script>
  </body>
</html>
