<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="view-transition" content="same-origin" />
    <title>New Recipe</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/editor.css" />
    <script>
      const isMenu = () => !!document.querySelector(".menu-overlay");
      window.addEventListener("pageswap", (e) => {
        if (e.viewTransition)
          e.viewTransition.types.add(isMenu() ? "from-menu" : "to-menu");
      });
      window.addEventListener("pagereveal", (e) => {
        if (e.viewTransition)
          e.viewTransition.types.add(isMenu() ? "to-menu" : "from-menu");
      });
    </script>
  </head>
  <body>
    <header>
      <a href="menu.html" class="menu-btn" aria-label="Open menu">☰</a>
    </header>
    <main class="editor-page">
      <div class="editor-container">
        <div class="editor-card">
          <input
            type="text"
            id="recipe-title"
            class="editor-title"
            placeholder="Recipe title..."
            autocomplete="off"
          />
          <div id="editorjs"></div>
        </div>

        <div class="tag-picker">
          <div class="tag-picker-group">
            <span class="tag-picker-label">Roast</span>
            <div class="tag-picker-chips">
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="roast:light"
                /><span>Light</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="roast:medium"
                /><span>Medium</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="roast:dark"
                /><span>Dark</span></label
              >
            </div>
          </div>
          <div class="tag-picker-group">
            <span class="tag-picker-label">Method</span>
            <div class="tag-picker-chips">
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="method:standard"
                /><span>Standard</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="method:inverted"
                /><span>Inverted</span></label
              >
            </div>
          </div>
          <div class="tag-picker-group">
            <span class="tag-picker-label">Grind</span>
            <div class="tag-picker-chips">
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="grind:extra-fine"
                /><span>Extra fine</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="grind:fine"
                /><span>Fine</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="grind:medium-fine"
                /><span>Med-fine</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="grind:medium"
                /><span>Medium</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="grind:medium-coarse"
                /><span>Med-coarse</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="grind:coarse"
                /><span>Coarse</span></label
              >
            </div>
          </div>
          <div class="tag-picker-group">
            <span class="tag-picker-label">Other</span>
            <div class="tag-picker-chips">
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="other:paper-filter"
                /><span>Paper filter</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="other:metal-filter"
                /><span>Metal filter</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="other:fruit-filter"
                /><span>Fruit filter</span></label
              >
              <label class="tag-chip"
                ><input
                  type="checkbox"
                  name="recipe-tag"
                  value="other:ice"
                /><span>Ice</span></label
              >
            </div>
          </div>
        </div>

        <button type="button" class="editor-submit" id="submit-recipe">
          Submit
        </button>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@editorjs/editorjs@2/dist/editorjs.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/header@2/dist/header.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/list@2/dist/editorjs-list.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@editorjs/delimiter@1/dist/delimiter.umd.js"></script>
    <script src="js/new-recipe.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
