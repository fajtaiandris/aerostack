<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="view-transition" content="same-origin" />
    <title>Menu</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script>
      const isMenu = () => !!document.querySelector(".menu-overlay");
      window.addEventListener("pageswap", (e) => {
        if (e.viewTransition)
          e.viewTransition.types.add(isMenu() ? "from-menu" : "to-menu");
      });
      window.addEventListener("pagereveal", (e) => {
        if (e.viewTransition)
          e.viewTransition.types.add(isMenu() ? "to-menu" : "from-menu");
      });
    </script>
  </head>
  <body>
    <div class="menu-overlay">
      <header>
        <a href="#" class="close-btn" id="closeMenu" aria-label="Close menu"
          >✕</a
        >
      </header>
      <nav>
        <ul>
          <li><a href="/search">Search</a></li>
          <li><a href="/new-recipe">Add one</a></li>
          <li><a href="/contact">Contact</a></li>
          <li><a href="/terms">Terms</a></li>
        </ul>
      </nav>
    </div>
    <script src="/menu.js"></script>
  </body>
</html>
