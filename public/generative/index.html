<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seeded Graphics • AeroStack</title>
    <link rel="stylesheet" href="/css/tokens.css" />
    <link rel="stylesheet" href="/generative/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <h1>Seeded Graphics</h1>
        <p class="intro">
          Use <code>?seed=your-text</code> (or <code>?q=your-text</code>). The
          same seed always produces the exact same image.
        </p>

        <form id="seed-form" class="seed-form" autocomplete="off">
          <label for="seed-input">Seed</label>
          <div class="seed-row">
            <input
              id="seed-input"
              name="seed"
              type="text"
              placeholder="Try: sunburst-77"
            />
            <button type="submit">Render</button>
          </div>
        </form>

        <p class="meta">
          Active seed: <code id="active-seed"></code><br />
          Layout mode: <span id="layout-name"></span>
        </p>
      </section>

      <section class="art-wrap">
        <svg
          id="artboard"
          viewBox="0 0 1200 630"
          role="img"
          aria-label="Deterministic generative artwork"
        ></svg>
      </section>
    </main>

    <script src="/generative/main.js"></script>
  </body>
</html>
